name: Agent Social Media

on:
  schedule:
    - cron: '0 6 * * 1' # Poniedziałki o 06:00 UTC (08:00 CEST)
    - cron: '0 6 * * 4' # Czwartki o 06:00 UTC (08:00 CEST)
  workflow_dispatch: # Pozwala uruchomić ręcznie z zakładki Actions

permissions:
  contents: write
  id-token: write

jobs:
  create_posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect weekly transcripts
        id: find
        run: |
          chmod +x scripts/transcripts_find_week.sh
          FILES=$(bash scripts/transcripts_find_week.sh "$(date +%Y-%m-%d)" transcripts)

          if [ -z "$FILES" ]; then
            echo "Brak transkryptów w tym tygodniu — agent wygeneruje posty bez kontekstu bieżącego tygodnia."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Znaleziono transkrypty:"
            echo "$FILES"
            echo "has_files=true" >> "$GITHUB_OUTPUT"

            mkdir -p /tmp/socialmedia

            while IFS= read -r filepath; do
              [ -z "$filepath" ] && continue
              if [ -f "$filepath" ]; then
                echo "### $(basename "$filepath")" >> /tmp/socialmedia/transcripts.md
                echo "" >> /tmp/socialmedia/transcripts.md
                cat "$filepath" >> /tmp/socialmedia/transcripts.md
                echo "" >> /tmp/socialmedia/transcripts.md
              fi
            done <<< "$FILES"

            echo "Transkrypty gotowe: $(wc -l < /tmp/socialmedia/transcripts.md) linii."
          fi

      - name: Load recent drafts for context
        run: |
          mkdir -p /tmp/socialmedia
          ls -t agent_socialmedia/drafts/202*.md 2>/dev/null | head -3 | while read f; do
            echo "=== POPRZEDNI DRAFT: $(basename "$f") ==="
            head -50 "$f"
          done > /tmp/socialmedia/recent_context.md
          if [ -s /tmp/socialmedia/recent_context.md ]; then
            echo "Załadowano kontekst poprzednich draftów: $(wc -l < /tmp/socialmedia/recent_context.md) linii."
          else
            echo "Brak poprzednich draftów do załadowania."
          fi

      - name: Load published posts for context
        run: |
          mkdir -p /tmp/socialmedia
          if ls agent_socialmedia/publikacje/*.md 2>/dev/null | head -1 | grep -q .; then
            {
              echo "=== OPUBLIKOWANE POSTY (ostatnie 4 tygodnie) ==="
              ls -t agent_socialmedia/publikacje/*.md | head -4 | while read f; do
                echo "--- $(basename "$f") ---"
                tail -20 "$f"
                echo ""
              done
            } > /tmp/socialmedia/published_context.md
            echo "Załadowano kontekst opublikowanych postów: $(wc -l < /tmp/socialmedia/published_context.md) linii."
          else
            echo "Brak opublikowanych postów do załadowania."
          fi

      - name: Build prompt
        run: |
          mkdir -p /tmp/socialmedia

          {
            echo "=== KONTEKST AGENTA ==="
            echo ""
            cat agent_socialmedia/README.md
            echo ""
            echo "=== MATERIAŁY ŹRÓDŁOWE ==="
            echo ""
            echo "--- Styl pisania firmy AISP ---"
            cat agent_socialmedia/wiedza/styl_pisania_aisp_.md
            echo ""
            echo "--- Styl pisania CEO (Sławomir Paszko) ---"
            cat agent_socialmedia/wiedza/styl_pisania_slawomir_paszko.md
            echo ""
            echo "--- Szablon posta firmowego AISP ---"
            cat agent_socialmedia/wiedza/szablon_aisp.md
            echo ""
            echo "--- Szablon posta osobistego CEO ---"
            cat agent_socialmedia/wiedza/szablon_mojego_posta.md
            echo ""
            echo "--- Opis produktu: AITracker ---"
            cat agent_socialmedia/wiedza/czym_jest_aitracker.md
            echo ""
            echo "--- Opis produktu: Liczbox ---"
            cat agent_socialmedia/wiedza/czym_jest_liczbox.md
            echo ""
            if [ -f /tmp/socialmedia/transcripts.md ]; then
              echo "=== TRANSKRYPTY Z BIEŻĄCEGO TYGODNIA ==="
              echo ""
              cat /tmp/socialmedia/transcripts.md
              echo ""
            fi
            if [ -s /tmp/socialmedia/recent_context.md ]; then
              echo "=== OSTATNIE DRAFTY (unikaj powtórzeń tematów i hooków) ==="
              echo ""
              cat /tmp/socialmedia/recent_context.md
              echo ""
            fi
            if [ -f /tmp/socialmedia/published_context.md ]; then
              echo "=== POSTY OPUBLIKOWANE W OSTATNICH 4 TYGODNIACH ==="
              echo ""
              cat /tmp/socialmedia/published_context.md
              echo ""
            fi
            echo "=== INSTRUKCJE ZADANIA ==="
            echo ""
            echo "Jesteś ekspertem Social Media B2B dla spółki AISP. Twoim celem jest wygenerowanie"
            echo "3 gotowych draftów postów na podstawie powyższego kontekstu (i transkryptów tygodnia, jeśli dostępne)."
            echo ""
            echo "Przestrzegaj proporcji językowej: ~60% EN (AITracker, rynki zagraniczne) / ~40% PL (Liczbox, Smart City)."
            echo "Użyj frameworku V2D (Vision to Decision) tam, gdzie pasuje."
            echo "Pamiętaj: ton łączy zwinność startupu ze stabilnością grupy 170 inżynierów Software Interactive."
            echo "Jeśli w kontekście są poprzednie drafty lub opublikowane posty — nie powtarzaj tematów ani hooków z ostatnich 3 sesji."
            echo ""
            echo "Dostępne formaty postów do rotacji (wybierz najlepszy dla każdego posta):"
            echo "  - Post tekstowy (domyślny): narracyjny post z hookiem i hashtagami"
            echo "  - Ankieta LinkedIn [POLL]: krótki wstęp + pytanie z 4 opcjami odpowiedzi"
            echo "    Format: [POLL]: pytanie | opcja1 | opcja2 | opcja3 | opcja4"
            echo "  - Mini-seria: post numerowany w cyklu (np. 'Anatomy of a count #N: temat')"
            echo "  - Komentarz branżowy: sugerowany komentarz pod typowym postem w niszy ITS/traffic"
            echo ""
            echo "Dla każdego z 3 postów użyj dokładnie poniższego formatu:"
            echo ""
            echo "---"
            echo "[CEL POSTA]: (np. Góra lejka – Świadomość / Środek lejka – Edukacja / Dół lejka – Konwersja)"
            echo "[PROFIL]: (Profil osobisty Sławomira Paszko / Profil firmowy AISP)"
            echo "[JĘZYK]: (EN / PL)"
            echo "[FORMAT]: (Post tekstowy / Ankieta LinkedIn / Mini-seria / Komentarz branżowy)"
            echo "[TREŚĆ POSTA]:"
            echo "(Gotowa treść z chwytliwym pierwszym zdaniem, maksymalnie 4–5 hashtagami)"
            echo ""
            echo "[PROPOZYCJA GRAFIKI]:"
            echo "Opcja A (Screenshoty z systemu): Podaj dokładną instrukcję, jaki widok/funkcjonalność"
            echo "z AITrackera lub Liczboxa należy uchwycić jako zrzut ekranu."
            echo "Opcja B (Prompt AI do generatora): Gotowy prompt w języku angielskim dla Midjourney / DALL-E."
            echo "---"
            echo ""
            echo "POST 1: Firmowy AISP w języku EN – góra lub środek lejka (AITracker, rynki UK/Rumunia/USA)"
            echo "POST 2: Osobisty CEO – mix EN/PL – storytelling lub edukacja branżowa (rozważ format Ankiety lub Mini-serii)"
            echo "POST 3: Firmowy AISP lub CEO w języku PL – Liczbox / Smart City dla miast i gmin"
            echo ""
            echo "=== WAŻNE ZASADY TECHNICZNE ==="
            echo ""
            echo "1. WYPISZ wszystkie 3 posty bezpośrednio jako tekst na standardowe wyjście (stdout)."
            echo "2. NIE próbuj tworzyć ani zapisywać plików — Twój output trafia do pliku automatycznie przez redirect."
            echo "3. NIE uruchamiaj komend shell (ls, cat, touch, python) — nie masz uprawnień do zapisu w tym środowisku."
            echo "4. NIE sprawdzaj zawartości katalogów ani poprzednich draftów — kontekst jest już zawarty powyżej."
            echo "5. Zacznij BEZPOŚREDNIO od treści postów w podanym formacie (--- / [CEL POSTA] / itd.)."
          } > /tmp/socialmedia/prompt.txt

          echo "Prompt gotowy: $(wc -l < /tmp/socialmedia/prompt.txt) linii."

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        id: copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          PROMPT=$(cat /tmp/socialmedia/prompt.txt)
          mkdir -p /tmp/socialmedia/output

          # Stderr na logi, stdout do pliku z postami
          copilot -p "$PROMPT" 2>/tmp/socialmedia/copilot_stderr.log > /tmp/socialmedia/output/posts_raw.md

          # Wyczyść output — zachowaj tylko treść od pierwszego "---" (format postów)
          if grep -q '^\-\-\-' /tmp/socialmedia/output/posts_raw.md; then
            sed -n '/^---/,$p' /tmp/socialmedia/output/posts_raw.md > /tmp/socialmedia/output/posts.md
          else
            cp /tmp/socialmedia/output/posts_raw.md /tmp/socialmedia/output/posts.md
          fi

          LINES=$(wc -l < /tmp/socialmedia/output/posts.md)
          echo "Drafty postów wygenerowane: ${LINES} linii."

          if [ "$LINES" -lt 10 ]; then
            echo "::warning::Output Copilot jest podejrzanie krótki (${LINES} linii). Sprawdź logi stderr:"
            cat /tmp/socialmedia/copilot_stderr.log 2>/dev/null || true
          fi

          DATE=$(date +%Y-%m-%d)
          {
            echo "# Drafty postów social media – $DATE"
            echo ""
            cat /tmp/socialmedia/output/posts.md
          } > /tmp/socialmedia/output/posts-$DATE.md

          REPORT=$(cat /tmp/socialmedia/output/posts-$DATE.md)
          {
            echo "REPORT<<REPORT_EOF"
            echo "$REPORT"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate posts
        run: |
          POSTS=$(grep -c '\[CEL POSTA\]' /tmp/socialmedia/output/posts.md || true)
          echo "Liczba wygenerowanych postów: $POSTS"
          if [ "$POSTS" -lt 3 ]; then
            echo "::warning::Wygenerowano tylko $POSTS postów zamiast 3"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Render post cards
        id: render
        run: |
          mkdir -p /tmp/socialmedia/output/images

          uv run python3 scripts/render_post_cards.py \
            /tmp/socialmedia/output/posts.md \
            agent_socialmedia/grafiki \
            /tmp/socialmedia/output/images \
            2

          IMAGE_COUNT=$(ls /tmp/socialmedia/output/images/*.png 2>/dev/null | wc -l)
          echo "Wygenerowano kart brandingowych: $IMAGE_COUNT"

          if [ "$IMAGE_COUNT" -eq 0 ]; then
            echo "::warning::Nie wygenerowano żadnych kart brandingowych — prawdopodobnie posts.md nie zawiera postów w wymaganym formacie [CEL POSTA]."
            echo "Zawartość posts.md (pierwsze 30 linii):"
            head -30 /tmp/socialmedia/output/posts.md 2>/dev/null || echo "(plik nie istnieje)"
          fi

          # Lista plików PNG dla email (przecinkami)
          ATTACHMENTS=$(ls /tmp/socialmedia/output/images/*.png 2>/dev/null | paste -sd "," -)
          echo "attachments=${ATTACHMENTS}" >> "$GITHUB_OUTPUT"

      # --- DALL-E wyłączone — karty brandingowe z szablonów są lepsze ---
      # - name: Generate DALL-E images
      #   id: dalle
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #   run: |
      #     mkdir -p /tmp/socialmedia/output/images
      #
      #     uv run python3 scripts/generate_post_images.py \
      #       /tmp/socialmedia/output/posts.md \
      #       /tmp/socialmedia/output/images
      #
      #     DALLE_COUNT=$(ls /tmp/socialmedia/output/images/*_dalle.png 2>/dev/null | wc -l)
      #     echo "Wygenerowano obrazów DALL-E: $DALLE_COUNT"
      #
      #     # Łączna lista WSZYSTKICH PNG (branded karty + DALL-E)
      #     ATTACHMENTS=$(ls /tmp/socialmedia/output/images/*.png 2>/dev/null | paste -sd "," -)
      #     echo "attachments=${ATTACHMENTS}" >> "$GITHUB_OUTPUT"

      - name: Save and commit drafts to repository
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p agent_socialmedia/drafts
          cp /tmp/socialmedia/output/posts-$DATE.md agent_socialmedia/drafts/$DATE.md
          echo "Drafty zapisane: agent_socialmedia/drafts/$DATE.md"

          # Rozdziel posty na osobne pliki (tylko .md — bez PNG)
          DATE=$DATE python3 scripts/split_posts.py

          git config user.name "GitHub Actions (Agent Social Media)"
          git config user.email "actions@github.com"
          git add agent_socialmedia/drafts/
          if git diff --cached --quiet; then
            echo "Brak zmian do commitowania."
          else
            git commit -m "🤖 Social Media drafty postów – $DATE"

            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "Push zakończony sukcesem (próba ${i})."
                break
              fi

              echo "Push nieudany (próba ${i}/${MAX_RETRIES}) – próba pull --rebase..."
              if ! git pull --rebase origin HEAD; then
                echo "Wykryto konflikt podczas rebase – przerywam."
                git rebase --abort
                exit 1
              fi

              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "Przekroczono limit prób push (${MAX_RETRIES}) – przerywam."
                exit 1
              fi
            done
          fi

      - name: Upload posts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-media-posts-${{ github.run_id }}
          path: |
            /tmp/socialmedia/output/
            /tmp/socialmedia/copilot_stderr.log
          retention-days: 14
          include-hidden-files: false

      - name: Send posts via Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail-serwer99770.lh.pl
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🤖 AISP - drafty postów social media (tydzień ${{ github.run_id }})"
          to: ${{ secrets.AGENT_SOCIALMEDIA_RECEIPIENTS }}
          from: AISP agent socialmedia <${{ secrets.MAIL_USERNAME }}>
          html_body: ${{ steps.copilot.outputs.REPORT }}
          convert_markdown: true
          attachments: ${{ steps.render.outputs.attachments }}
